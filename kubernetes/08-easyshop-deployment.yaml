
# ==================================================
# API Version
# ==================================================

# apps/v1 workloads ke liye use hota hai.
#
# Examples:
# - Deployment
# - StatefulSet
# - DaemonSet
apiVersion: apps/v1


# ==================================================
# Resource Type
# ==================================================

# Deployment stateless applications ke liye use hota hai.
#
# Examples:
# - React App
# - NodeJS App
# - NextJS App
# - Spring Boot App
#
# Deployment:
# ✅ Auto Healing
# ✅ Rolling Updates
# ✅ Scaling
# ✅ High Availability
kind: Deployment


metadata:

  # Deployment Name
  name: easyshop

  # Namespace
  namespace: easyshop


spec:

  # ==================================================
  # Replicas
  # ==================================================

  # Application ki 2 copies run hongi.
  #
  # Agar ek pod fail ho jaye
  # to doosra pod users ko serve karega.
  replicas: 2


  # ==================================================
  # Pod Selection
  # ==================================================

  selector:

    matchLabels:

      # Deployment sirf un Pods ko manage karega
      # jin par app=easyshop label hoga.
      app: easyshop


  # ==================================================
  # Pod Template
  # ==================================================

  template:

    metadata:

      labels:

        # Service isi label ko use karke
        # EasyShop Pods ko identify karegi.
        app: easyshop


    spec:

      containers:

      - name: easyshop

        # Docker Image
        #
        # Jenkins Pipeline isi image ko build aur push karti hai.
        image: trainwithshubham/easyshop-app:1


        # Har deployment par latest image pull karega.
        imagePullPolicy: Always


        # Application Port
        ports:

        - containerPort: 3000


        # ==================================================
        # ConfigMap + Secret Injection
        # ==================================================

        envFrom:

        # ConfigMap ki saari values inject karega.
        - configMapRef:
            name: easyshop-config

        # Secret ki saari values inject karega.
        - secretRef:
            name: easyshop-secrets


        # ==================================================
        # Explicit Environment Variables
        # ==================================================

        env:

        # NextAuth URL
        - name: NEXTAUTH_URL
          valueFrom:
            configMapKeyRef:
              name: easyshop-config
              key: NEXTAUTH_URL


        # NextAuth Secret
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: easyshop-secrets
              key: NEXTAUTH_SECRET


        # JWT Secret
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: easyshop-secrets
              key: JWT_SECRET


        # ==================================================
        # Resource Management
        # ==================================================

        resources:

          # Minimum Resources
          requests:

            memory: "256Mi"

            cpu: "200m"


          # Maximum Resources
          limits:

            memory: "512Mi"

            cpu: "500m"


        # ==================================================
        # Startup Probe
        # ==================================================

        startupProbe:

          httpGet:

            path: /

            port: 3000

          # Maximum 30 failures allow
          failureThreshold: 30

          # Har 10 second me check
          periodSeconds: 10


        # ==================================================
        # Readiness Probe
        # ==================================================

        readinessProbe:

          httpGet:

            path: /

            port: 3000

          # Application ko start hone ke liye
          # 20 seconds ka time.
          initialDelaySeconds: 20

          # Har 15 second me health check.
          periodSeconds: 15


        # ==================================================
        # Liveness Probe
        # ==================================================

        livenessProbe:

          httpGet:

            path: /

            port: 3000

          # Startup ke baad health check start karega.
          initialDelaySeconds: 25

          # Har 20 second me health check.
          periodSeconds: 20

